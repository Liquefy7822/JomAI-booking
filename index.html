<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JomAI Badminton Court Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://js.puter.com/v2/"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50">
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <h1 class="text-xl font-bold text-gray-900">🏸 JomAI Badminton</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <button onclick="toggleDarkMode()" class="px-3 py-1 text-sm bg-gray-100 text-gray-800 rounded-md hover:bg-gray-200" title="Toggle dark mode">
                        <span id="darkModeIcon">🌙</span>
                    </button>
                    <button onclick="toggleDemoMode()" class="px-3 py-1 text-sm bg-yellow-100 text-yellow-800 rounded-md hover:bg-yellow-200">
                        <span id="demoModeText">Demo: OFF</span>
                    </button>
                    <a href="matchmaking.html" class="px-3 py-1 text-sm bg-blue-100 text-blue-800 rounded-md hover:bg-blue-200">
                        Matchmaking
                    </a>
                    <a href="admin.html" class="px-3 py-1 text-sm bg-purple-100 text-purple-800 rounded-md hover:bg-purple-200">
                        Admin
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="mb-8">
            <h2 class="text-2xl font-bold text-gray-900 mb-2">Book a Court</h2>
            <p class="text-gray-600">Select your preferred date, time, and court</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Booking Form -->
            <div class="lg:col-span-2">
                <div class="bg-white rounded-lg shadow p-6">
                    <form id="bookingForm">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Date</label>
                                <input type="date" id="bookingDate" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Time Slot</label>
                                <select id="timeSlot" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                                    <option value="">Select a time</option>
                                    <option value="08:00-09:00">8:00 AM - 9:00 AM</option>
                                    <option value="09:00-10:00">9:00 AM - 10:00 AM</option>
                                    <option value="10:00-11:00">10:00 AM - 11:00 AM</option>
                                    <option value="11:00-12:00">11:00 AM - 12:00 PM</option>
                                    <option value="14:00-15:00">2:00 PM - 3:00 PM</option>
                                    <option value="15:00-16:00">3:00 PM - 4:00 PM</option>
                                    <option value="16:00-17:00">4:00 PM - 5:00 PM</option>
                                    <option value="17:00-18:00">5:00 PM - 6:00 PM</option>
                                    <option value="18:00-19:00">6:00 PM - 7:00 PM</option>
                                    <option value="19:00-20:00">7:00 PM - 8:00 PM</option>
                                    <option value="20:00-21:00">8:00 PM - 9:00 PM</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-6">
                            <label class="block text-sm font-medium text-gray-700 mb-2">Select Court</label>
                            <div id="courtsList" class="grid grid-cols-1 md:grid-cols-2 gap-3">
                                <!-- Courts will be populated here -->
                            </div>
                        </div>

                        <div class="mb-6">
                            <label class="flex items-center">
                                <input type="checkbox" id="shareSlot" class="mr-2 h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                                <span class="text-sm text-gray-700">Open to sharing this slot with other players?</span>
                            </label>
                        </div>

                        <div class="mb-6">
                            <label class="block text-sm font-medium text-gray-700 mb-2">Your Name</label>
                            <input type="text" id="playerName" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                        </div>

                        <button type="submit" class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                            Book Court
                        </button>
                    </form>
                </div>

                <!-- AI Suggestions Section -->
                <div class="bg-white rounded-lg shadow p-6 mt-6">
                    <h3 class="text-lg font-semibold text-gray-900 mb-4">🤖 AI Suggestions</h3>
                    <div id="aiSuggestions" class="space-y-3">
                        <div class="text-gray-500 text-sm">Loading suggestions...</div>
                    </div>
                </div>
            </div>

            <!-- Sidebar -->
            <div class="lg:col-span-1">
                <!-- Current Bookings -->
                <div class="bg-white rounded-lg shadow p-6 mb-6">
                    <h3 class="text-lg font-semibold text-gray-900 mb-4">Current Bookings</h3>
                    <div id="currentBookings" class="space-y-3">
                        <div class="text-gray-500 text-sm">No bookings yet</div>
                    </div>
                </div>

                <!-- Cancellation Alerts -->
                <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-6">
                    <h3 class="text-lg font-semibold text-yellow-900 mb-4">⚡ Last-Minute Deals</h3>
                    <div id="cancellationAlerts" class="space-y-3">
                        <div class="text-yellow-700 text-sm">No cancellations available</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
